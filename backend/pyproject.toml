[tool.ruff]
line-length = 88
target-version = "py312"
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "W"]

[tool.black]
line-length = 88
target-version = ["py312"]
extend-exclude = "alembic/versions"

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["."]
