services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: europark
      POSTGRES_PASSWORD: europark
      POSTGRES_DB: europark
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U europark"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://europark:europark@db:5432/europark
      JWT_SECRET: BlpknWxcgBxIzkVPSkrrFDy-Xn22mvuhnUnB_KJL36fAOHq10sY-9RVoiXfPZP7t
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      NUXT_API_BASE: http://backend:8000
      NUXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.nuxt

volumes:
  pgdata:
